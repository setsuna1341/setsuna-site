<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- スマホ対応 -->
  <title>1stライブ物販情報</title>
  <link rel="stylesheet" href="../style.css"> <!-- 共通CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../images/favicon.png">
</head>

<body>

  <!-- 共通ヘッダー（コピペでOK） -->
  <div id="header"></div>

  <script src="../header.js"></script>

  <section class="hero">
    <img src="../images/1stlive_logo.png" class="hero-image">
  </section>

  <section class="goods-poster">

    <h1 class="poster-title">
      GOODS LINEUP
    </h1>

    <p class="poster-subtitle">
      1st LIVE 会場物販
    </p>

    <div class="poster-grid">

      <!-- ペンライト -->
      <div class="poster-item">
        <img src="../images/1st_goods/light.png">

        <div class="item-info">
          <h2>オリジナルペンライト</h2>

          <p class="price">
            3,000円(税込み)
          </p>

          <p class="desc">
            ライブ必携アイテム！
          </p>
        </div>
      </div>

      <!-- チェキ -->
      <div class="poster-item">
        <img src="../images/1st_goods/photo.png">

        <div class="item-info">
          <h2>チェキ風カード</h2>

          <p class="price">
            300円(税込み)
          </p>

          <p class="desc">
            3枚入り
          </p>
        </div>
      </div>

      <!-- アクスタ -->
      <div class="poster-item">

        <div class="stand-grid">
          <img src="../images/1st_goods/standA.png">
          <img src="../images/1st_goods/standB.png">
        </div>

        <div class="item-info">
          <h2>私服アクリルスタンド</h2>
          <p class="price">1,200円(税込み)</p>
          <p class="desc">全2種類</p>
        </div>

      </div>

    </div>

  </section>

</body>
</html>
