  <script>
    const track = document.querySelector('.carousel-track');

    if (!track) {
      console.log("carousel not found");
    }
    else {
      const slides = document.querySelectorAll('.slide');
      const prev = document.querySelector('.prev');
      const next = document.querySelector('.next');
      const dotsContainer = document.querySelector('.dots');

      let index = 0;
      let interval;

  /* ===== ドット生成 ===== */
      slides.forEach((_, i) => {
        const dot = document.createElement('span');
        if (i === 0) dot.classList.add('active');

        dot.addEventListener('click', () => {
        index = i;
        updateSlide();
      });

      dotsContainer.appendChild(dot);
      });

      function updateSlide() {
        track.style.transform = `translateX(-${index * 100}%)`;

        document.querySelectorAll('.dots span').forEach(dot => dot.classList.remove('active'));
        document.querySelectorAll('.dots span')[index].classList.add('active');
      }

      next.addEventListener('click', () => {
        index = (index + 1) % slides.length;
        updateSlide();
      });

      prev.addEventListener('click', () => {
        index = (index - 1 + slides.length) % slides.length;
        updateSlide();
      });

      function startAutoSlide() {
        interval = setInterval(() => {
          index = (index + 1) % slides.length;
          updateSlide();
        }, 3000);
      }

      function stopAutoSlide() {
      clearInterval(interval);
    }

    document.querySelector('.carousel').addEventListener('mouseenter', stopAutoSlide);
    document.querySelector('.carousel').addEventListener('mouseleave', startAutoSlide);

    startAutoSlide();

  }
  </script>
